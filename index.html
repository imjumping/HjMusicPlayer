<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>HougeJump Music Player</title>
  <style>
    * {
      -webkit-user-select: none;
      user-select: none;
    }
    html {
      font-size: 20px;
    }
    body {
      font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    h1 {
      color: aqua;
      font-family: "Ubuntu";
      margin-top: 0;
      padding-top: 20px;
    }
    span {
      color: blueviolet;
      background-color: aquamarine;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      transition: all 0.2s ease-out;
      font-size: 20px;
      border-radius: 10px;
      display: inline-block;
      padding: 0 5px;
    }
    span:hover {
      transform: scale(1.01);
    }
    p {
      color: white;
      font-size: 30px;
      font-family: serif;
    }
    img {
      border-radius: 40px;
      transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      width: 90px;
      height: 90px;
      position: absolute;
      top: 20px;
      left: 20px;
      -webkit-app-region: no-drag;
      z-index: 3;
    }
    img:hover {
      border-radius: 80px;
      transform: rotate(360deg);
      box-shadow: 0 5px 15px rgba(171, 171, 171, 0.3);
    }
    main {
      flex: 1 1 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-height: 0;
      overflow-y: auto;
      z-index: 1;
    }
    footer {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
      gap: 15px;
    }
    .playbtn {
      border-radius: 50px;
      background-color: rgba(0, 132, 255, 0.5);
      border: 2px solid rgba(0, 255, 255, 0.3);
      color: rgb(0, 0, 0);
      cursor: pointer;
      width: 100px;
      height: 100px;
      transition: all 0.3s cubic-bezier(0.25, -0.55, 0.25, 1.55);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      font-size: 50px;
      -webkit-app-region: no-drag;
      z-index: 3;
      backdrop-filter: blur(5px);
    }
    .playbtn:hover {
      border-radius: 60px;
      background-color: rgba(43, 226, 147, 0.3);
      border: 3px solid rgba(0, 255, 38, 0.3);
      transform: scale(1.1);
      color: white;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
    }
    .playbtn:active {
      background-color: rgba(0, 149, 255, 0.4);
      border: 2px solid rgba(0, 255, 255, 0.527);
      border-radius: 20px;
      transform: scale(0.8);
      color: rgb(42, 42, 42);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(3px);
    }
    .clsbtn {
      background: none;
      border: 2px solid rgba(0, 255, 255, 0.3);
      color: aqua;
      width: 70px;
      height: 70px;
      border-radius: 30px;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease-out;
      background-color: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      padding: 0;
      line-height: 1;
      margin: 10px 5px;
      position: absolute;
      top: 25px;
      -webkit-app-region: no-drag;
      z-index: 3;
    }
    #minihua {
      right: 180px;
    }
    #maxhua {
      right: 100px;
    }
    #closehua {
      right: 20px;
    }
    .clsbtn:hover {
      border-color: aqua;
      background-color: rgba(0, 255, 255, 0.2);
      transform: scale(1.1);
      border-radius: 20px;
      color: white;
    }
    .clsbtn:active {
      transform: scale(0.9);
      background-color: aqua;
      color: black;
    }
    .window-content {
      position: fixed;
      top: 22px;
      left: 22px;
      right: 22px;
      bottom: 22px;
      background-image: url("https://uapis.cn/api/v1/random/image?category=landscape");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }
    .drag-area {
      position: absolute;
      background-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 10px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      top: 15px;
      left: 15px;
      right: 10px;
      height: 100px;
      -webkit-app-region: drag;
      z-index: 1;
      border-radius: 50px;
    }
    #musicname {
      padding-left: 120px;
      position: relative;
      z-index: 3;
    }
    #musicauthor {
      position: relative;
      z-index: 3;
    }
    .lyricBox {
      position: relative;
      display: flex;
      z-index: 0;
      background-color: rgba(75, 75, 75, 0.5);
      border-radius: 20px;
      width: auto;
      height: 400px;
      font-size: 24px;
      justify-content: flex-start;
      align-items: center;
      flex-direction: column;
      box-shadow: 0 10px 10px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.25, 1.5, 0.5, 1.2);
      padding: 20px;
      overflow-y: auto;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 168, 3, 0.5) rgba(141, 0, 0, 0.1);
    }
    .lyricBox:hover {
      transform: scale(1.01);
    }

    .lyric-line {
      width: 100%;
      text-align: center;
      margin: 8px 0;
      padding: 5px 0;
      transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: text;
      user-select: text;
      word-wrap: break-word;
      white-space: pre-wrap;
      border: 4px solid white;
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.1);
      box-sizing: border-box;
    }

    .lyric-line.played {
      color: rgb(200, 10, 10);
      border: 3px solid black;
      text-shadow: 0 10px 10px rgba(0, 0, 0, 0.5);
      transform: scale(0.95);
    }

    .lyric-line.unplayed {
      color: rgb(0, 0, 0);
      border: 4px solid white;
      text-shadow: 0 5px 5px rgba(0, 0, 0, 0.4);
      opacity: 0.7;
    }

    .lyric-line.current {
      transform: scale(1.1);
      border: 3px solid gold;
      background-color: rgba(255, 215, 0, 0.2);
      z-index: 10;
      position: relative;
      animation: currentLyricPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes currentLyricPop {
      0% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.15);
      }
      100% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    .word {
      display: inline-block;
      transition: all 0.3s ease;
      margin: 0 2px;
    }

    .word.played {
      color: rgb(200, 10, 10);
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
      transform: scale(1.05);
    }

    .word.current-word {
      color: gold;
      transform: scale(1.15);
      text-shadow: 0 0 15px gold;
      font-weight: bold;
    }

    .progress-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .time-display {
      color: white;
      font-size: 16px;
      font-family: monospace;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    .progress-container {
      width: 80%;
      height: 10px;
      background-color: rgba(255, 255, 255, 0.3);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #e0ffff, #6dffaf);
      border-radius: 5px;
      position: relative;
      transition: width 0.1s linear;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    }

    .progress-handle {
      width: 20px;
      height: 20px;
      background-color: white;
      border-radius: 50%;
      position: absolute;
      right: -10px;
      top: -5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      cursor: grab;
      border: 2px solid #00ffff;
      transition: transform 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .progress-handle:hover {
      transform: scale(1.2);
      background-color: #00ffff;
    }

    .progress-handle:active {
      cursor: grabbing;
      transform: scale(0.9);
    }

    .upload-section {
      margin-top: 20px;
      padding: 15px;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      backdrop-filter: blur(5px);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .file-input {
      display: none;
    }

    .upload-btn {
      background-color: rgba(0, 132, 255, 0.6);
      color: white;
      border: 2px solid rgba(0, 255, 255, 0.3);
      border-radius: 30px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
      white-space: nowrap;
    }

    .upload-btn:hover {
      background-color: rgba(0, 200, 255, 0.8);
      transform: scale(1.05);
    }

    .upload-btn:active {
      transform: scale(0.95);
    }

    .file-name {
      color: rgb(35, 35, 35);
      font-size: 14px;
      opacity: 0.8;
      text-shadow: 2px 10px 10px rgba(0, 0, 0, 0.5);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-status {
      width: 100%;
      color: #88888899;
      font-size: 14px;
      padding: 5px;
      border-radius: 5px;
      text-align: center;
      height: 20px;
      opacity: 1;
      transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      max-height: 50px;
      overflow: hidden;
      margin: 5px 0;
    }

    .upload-status.hidden {
      opacity: 0;
      max-height: 0;
      padding: 0 5px;
      margin: 0;
      pointer-events: none;
    }

    .success {
      color: #008f40;
    }

    .error {
      color: #ff410c;
    }
  </style>
</head>
<body>
  <div class="window-content">
    <div class="drag-area"></div>
    <img src="res/jumplayer.png" alt="1+1=3" />
    <button class="clsbtn" id="minihua">😑</button>
    <button class="clsbtn" id="maxhua">🙄</button>
    <button class="clsbtn" id="closehua">😵</button>
    <main>
      <p id="musicname">name<span id="musicauthor">author</span></p>

      <div class="lyricBox" id="lyricContainer"></div>

      <div class="upload-section">
        <input type="file" id="lrcFileInput" class="file-input" accept=".lrc" />
        <button class="upload-btn" id="selectFileBtn">📁 选择LRC文件</button>
        <span class="file-name" id="selectedFileName">未选择文件</span>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
    </main>
    <footer>
      <div class="progress-section">
        <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar">
            <div class="progress-handle" id="progressHandle"></div>
          </div>
        </div>
      </div>
      
      <div style="display: flex; gap: 10px; align-items: center;">
        <button class="playbtn" id="playButton">▶</button>
        <button class="upload-btn" id="desktopLyricBtn" style="width: 50px; height: 50px; border-radius: 25px; font-size: 24px;">💬</button>
      </div>
    </footer>
  </div>

  <script>
    const playBtn = document.getElementById("playButton");
    const lyricContainer = document.getElementById("lyricContainer");
    const musicName = document.getElementById("musicname");
    const musicAuthor = document.getElementById("musicauthor");
    const progressBar = document.getElementById("progressBar");
    const progressContainer = document.getElementById("progressContainer");
    const progressHandle = document.getElementById("progressHandle");
    const timeDisplay = document.getElementById("timeDisplay");

    let isPlaying = false;
    let currentLyrics = [];
    let currentLyricIndex = -1;
    let currentWordIndex = -1;
    let lyricInterval = null;
    let startTime = 0;
    let currentTime = 0;
    let totalDuration = 0;
    let isDragging = false;
    let fadeTimer = null;

    const lrcFileInput = document.getElementById("lrcFileInput");
    const selectFileBtn = document.getElementById("selectFileBtn");
    const selectedFileName = document.getElementById("selectedFileName");
    const uploadStatus = document.getElementById("uploadStatus");
    const desktopLyricBtn = document.getElementById('desktopLyricBtn');
    let desktopLyricVisible = true;

    selectFileBtn.addEventListener("click", () => {
      lrcFileInput.click();
    });

    function showStatusMessage(html) {
      if (fadeTimer) clearTimeout(fadeTimer);
      uploadStatus.innerHTML = html;
      uploadStatus.classList.remove('hidden');
      fadeTimer = setTimeout(() => {
        uploadStatus.classList.add('hidden');
        fadeTimer = null;
      }, 5000);
    }

    lrcFileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        if (!file.name.toLowerCase().endsWith(".lrc")) {
          showStatusMessage('<span class="error">❌ 只允许上传.lrc文件！</span>');
          lrcFileInput.value = "";
          selectedFileName.textContent = "未选择文件";
          return;
        }
        selectedFileName.textContent = file.name;
        showStatusMessage('<span class="success">⏳ 正在加载LRC文件...</span>');
        loadLRCFile(file);
      } else {
        selectedFileName.textContent = "未选择文件";
        uploadStatus.innerHTML = "";
      }
    });

    function loadLRCFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        parseLRC(e.target.result, file.name);
        showStatusMessage('<span class="success" style="text-shadow:0 10px 10px rgba(0,0,0,0.5);">文件加载成功！(`OwO,)</span>');
      };
      reader.onerror = () => showStatusMessage('<span class="error">❌ 文件读取失败！</span>');
      reader.readAsText(file, 'utf-8');
    }

    function parseLRC(lrcText, fileName) {
      currentLyrics = [];
      lyricContainer.innerHTML = "";

      let songName = fileName.replace(".lrc", "");
      let artist = "未知艺术家";

      const lines = lrcText.split("\n");
      const lyricLines = [];

      lines.forEach((line) => {
        if (line.startsWith("[ti:")) {
          songName = line.replace("[ti:", "").replace("]", "").trim();
        } else if (line.startsWith("[ar:")) {
          artist = line.replace("[ar:", "").replace("]", "").trim();
        } else {
          processLyricLine(line, lyricLines);
        }
      });

      lyricLines.sort((a, b) => a.time - b.time);

      if (lyricLines.length > 0) {
        currentLyrics = lyricLines;
        totalDuration = currentLyrics[currentLyrics.length - 1].time;
        if (totalDuration <= 0) totalDuration = 180;

        musicName.innerHTML = `歌曲：${songName}<span id="musicauthor">${artist}</span>`;
        renderLyrics();
        showStatusMessage(`<span class="success">✅ 成功加载 ${currentLyrics.length} 行歌词，总时长 ${formatTime(totalDuration)}</span>`);
      } else {
        showStatusMessage('<span class="error">⚠️ 未检测到时间标签</span>');
      }
    }

    function processLyricLine(line, lyricLines) {
      const timeRegex = /\[(\d{2}):(\d{2})[.:](\d{2,3})\]/g;
      const matches = [...line.matchAll(timeRegex)];
      if (matches.length === 0) return;

      let lyricText = line;
      matches.forEach(m => lyricText = lyricText.replace(m[0], ''));
      lyricText = lyricText.trim();
      if (!lyricText) return;

      matches.forEach((match) => {
        const minutes = parseInt(match[1]);
        const seconds = parseInt(match[2]);
        const ms = parseInt(match[3]);
        const timeInSeconds = minutes * 60 + seconds + (match[3].length === 3 ? ms / 1000 : ms / 100);

        const words = [];
        const wordRegex = /<(\d+),(\d+)>([^<]+)|\[(\d+),(\d+)\]([^\[]+)/g;
        let wordMatch;

        while ((wordMatch = wordRegex.exec(lyricText)) !== null) {
          if (wordMatch[1] && wordMatch[2] && wordMatch[3]) {
            words.push({
              text: wordMatch[3].trim(),
              start: parseInt(wordMatch[1]) / 1000,
              end: parseInt(wordMatch[2]) / 1000
            });
          } else if (wordMatch[4] && wordMatch[5] && wordMatch[6]) {
            words.push({
              text: wordMatch[6].trim(),
              start: parseInt(wordMatch[4]) / 1000,
              end: parseInt(wordMatch[5]) / 1000
            });
          }
        }

        lyricLines.push({
          time: timeInSeconds,
          text: lyricText,
          words: words.length > 0 ? words : null
        });
      });
    }

    function renderLyrics() {
      lyricContainer.innerHTML = "";
      currentLyrics.forEach((lyric, index) => {
        const lineDiv = document.createElement("div");
        lineDiv.className = "lyric-line unplayed";
        lineDiv.id = `lyric-${index}`;

        if (lyric.words && lyric.words.length > 0) {
          lyric.words.forEach((word, wordIndex) => {
            const wordSpan = document.createElement("span");
            wordSpan.className = "word";
            wordSpan.id = `word-${index}-${wordIndex}`;
            wordSpan.textContent = word.text + " ";
            lineDiv.appendChild(wordSpan);
          });
        } else {
          lineDiv.textContent = lyric.text;
        }
        lyricContainer.appendChild(lineDiv);
      });
      resetPlayback();
    }

    function resetPlayback() {
      if (lyricInterval) clearInterval(lyricInterval);
      isPlaying = false;
      playBtn.textContent = "▶";
      currentTime = 0;
      currentLyricIndex = -1;
      currentWordIndex = -1;
      startTime = 0;
      updateProgress(0);
      timeDisplay.textContent = `00:00 / ${formatTime(totalDuration)}`;
      document.querySelectorAll(".lyric-line").forEach(line => line.className = "lyric-line unplayed");
    }

    playBtn.addEventListener("click", function() {
      if (currentLyrics.length === 0) {
        showStatusMessage('<span class="error">⚠️ 请先上传LRC文件</span>');
        return;
      }
      if (!isPlaying) {
        playBtn.textContent = "⏸";
        isPlaying = true;
        startTime = Date.now() / 1000 - currentTime;
        startLyricScroll();
      } else {
        playBtn.textContent = "▶";
        isPlaying = false;
        if (lyricInterval) clearInterval(lyricInterval);
      }
    });

    function startLyricScroll() {
      if (lyricInterval) clearInterval(lyricInterval);
      if (currentTime > totalDuration) {
        currentTime = 0;
        startTime = Date.now() / 1000;
      }

      lyricInterval = setInterval(() => {
        if (!isPlaying || currentLyrics.length === 0) return;
        currentTime = Date.now() / 1000 - startTime;
        if (currentTime < 0) currentTime = 0;
        if (currentTime >= totalDuration) {
          resetPlayback();
          return;
        }
        updateProgress(currentTime);
        updateLyricsByTime(currentTime);
        updateWordsByTime(currentTime);
        updateDesktopLyric();
      }, 50);
    }

    function updateLyricsByTime(time) {
      let newIndex = -1;
      for (let i = currentLyrics.length - 1; i >= 0; i--) {
        if (time >= currentLyrics[i].time) {
          newIndex = i;
          break;
        }
      }

      if (newIndex !== currentLyricIndex) {
        document.querySelectorAll(".lyric-line").forEach((line, index) => {
          line.classList.remove("played", "unplayed", "current");
          if (index < newIndex) line.classList.add("played");
          else if (index === newIndex) {
            line.classList.add("current");
            setTimeout(() => line.scrollIntoView({ behavior: "smooth", block: "center" }), 50);
          } else line.classList.add("unplayed");
        });
        currentLyricIndex = newIndex;
      }
    }

    function updateWordsByTime(time) {
      if (currentLyricIndex < 0) return;
      const currentLyric = currentLyrics[currentLyricIndex];
      if (!currentLyric.words) return;

      let newWordIndex = -1;
      for (let i = currentLyric.words.length - 1; i >= 0; i--) {
        if (time >= currentLyric.words[i].start) {
          newWordIndex = i;
          break;
        }
      }

      if (newWordIndex !== currentWordIndex) {
        currentLyric.words.forEach((word, idx) => {
          const el = document.getElementById(`word-${currentLyricIndex}-${idx}`);
          if (el) {
            el.classList.remove("played", "current-word");
            if (idx < newWordIndex) el.classList.add("played");
            else if (idx === newWordIndex) el.classList.add("current-word");
          }
        });
        currentWordIndex = newWordIndex;
      }
    }

    function updateProgress(value) {
      if (typeof value === "number") {
        const percentage = totalDuration > 0 ? (value / totalDuration) * 100 : 0;
        progressBar.style.width = Math.min(100, Math.max(0, percentage)) + "%";
        timeDisplay.textContent = `${formatTime(value)} / ${formatTime(totalDuration)}`;
      }
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds < 0) return "00:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
    }

    progressContainer.addEventListener("mousedown", startDrag);
    progressHandle.addEventListener("mousedown", startDrag);

    function startDrag(e) {
      e.preventDefault();
      isDragging = true;
      document.addEventListener("mousemove", onDrag);
      document.addEventListener("mouseup", stopDrag);
    }

    function onDrag(e) {
      if (!isDragging) return;
      const rect = progressContainer.getBoundingClientRect();
      let pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
      progressBar.style.width = pct + "%";
      currentTime = (pct / 100) * totalDuration;
      timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(totalDuration)}`;
      if (isPlaying) startTime = Date.now() / 1000 - currentTime;
      updateLyricsByTime(currentTime);
      updateWordsByTime(currentTime);
      updateDesktopLyric();
    }

    function stopDrag() {
      isDragging = false;
      document.removeEventListener("mousemove", onDrag);
      document.removeEventListener("mouseup", stopDrag);
    }

    progressContainer.addEventListener("click", (e) => {
      if (e.target === progressHandle) return;
      const rect = progressContainer.getBoundingClientRect();
      let pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
      progressBar.style.width = pct + "%";
      currentTime = (pct / 100) * totalDuration;
      timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(totalDuration)}`;
      if (isPlaying) startTime = Date.now() / 1000 - currentTime;
      updateLyricsByTime(currentTime);
      updateWordsByTime(currentTime);
      updateDesktopLyric();
    });

    desktopLyricBtn.addEventListener('click', () => {
      desktopLyricVisible = !desktopLyricVisible;
      desktopLyricBtn.style.opacity = desktopLyricVisible ? '1' : '0.5';
      desktopLyricBtn.style.backgroundColor = desktopLyricVisible ? 'rgba(0, 132, 255, 0.6)' : 'rgba(100, 100, 100, 0.6)';
      if (window.electronAPI) window.electronAPI.toggleDesktopLyric(desktopLyricVisible);
    });

    function updateDesktopLyric() {
      if (!window.electronAPI) return;
      
      const currentLine = document.querySelector('.lyric-line.current');
      const nextLine = document.querySelector('.lyric-line.current + .lyric-line');
      
      let currentText = '', nextText = '', words = [];
      
      if (currentLine && currentLyricIndex >= 0 && currentLyrics[currentLyricIndex]) {
        const lyric = currentLyrics[currentLyricIndex];
        if (lyric.words && lyric.words.length > 0) {
          words = lyric.words.map((word, idx) => ({
            text: word.text,
            played: idx < currentWordIndex,
            current: idx === currentWordIndex
          }));
        } else {
          currentText = lyric.text;
        }
      }
      
      if (nextLine) {
        const nextIndex = currentLyricIndex + 1;
        if (nextIndex < currentLyrics.length) nextText = currentLyrics[nextIndex].text;
      }
      
      const songName = musicName.textContent.replace('歌曲：', '').split('<')[0] || '未知';
      const artist = document.getElementById('musicauthor')?.textContent || '未知';
      
      window.electronAPI.updateDesktopLyric({
        currentLine: currentText,
        nextLine: nextText,
        words: words,
        songName: songName,
        artist: artist,
        progress: totalDuration > 0 ? (currentTime / totalDuration) * 100 : 0,
        lyrics: currentLyrics,
        currentIndex: currentLyricIndex
      });
    }

    if (window.electronAPI) {
      document.getElementById("minihua").addEventListener("click", () => window.electronAPI.minimizeWindow());
      const maxBtn = document.getElementById("maxhua");
      maxBtn.addEventListener("click", () => window.electronAPI.maximizeWindow());
      window.electronAPI.onMaximize((isMaximized) => maxBtn.textContent = isMaximized ? "😤" : "🙄");
      document.getElementById("closehua").addEventListener("click", () => window.electronAPI.closeWindow());
    }
  </script>
</body>
</html>
