<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HougeJump Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="window-content">
    <div class="drag-area"></div>
    <img src="res/jumplayer.png" alt="1+1=3" />
    <button class="clsbtn" id="minihua">😑</button>
    <button class="clsbtn" id="maxhua">🙄</button>
    <button class="clsbtn" id="closehua">😵</button>
    <main>
      <p id="musicname">name<span id="musicauthor">author</span></p>

      <div class="lyricBox" id="lyricContainer"></div>

      <div class="upload-section">
        <input type="file" id="lrcFileInput" class="file-input" accept=".lrc" />
        <button class="upload-btn" id="selectFileBtn">📁 选择LRC文件</button>
        <span class="file-name" id="selectedFileName">未选择文件</span>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
    </main>
    <footer>
      <div class="progress-section">
        <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar">
            <div class="progress-handle" id="progressHandle"></div>
          </div>
        </div>
      </div>
      
      <div style="display: flex; gap: 10px; align-items: center;">
        <button class="playbtn" id="playButton">▶</button>
        <button class="upload-btn" id="desktopLyricBtn" style="width: 50px; height: 50px; border-radius: 25px; font-size: 24px;">词</button>
      </div>
    </footer>
  </div>

  <!-- 分离的 JavaScript 文件 -->
  <script src="script.js"></script>
</body>
</html>
