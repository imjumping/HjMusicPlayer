<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌面歌词</title>
  <!-- 分离的桌面歌词样式 -->
  <link rel="stylesheet" href="desktop-lyric.css">
</head>
<body>
  <div class="lyric-container" id="lyricContainer">
    <div class="song-info" id="songInfo">未播放 - 等待歌词...</div>
    <div class="current-line" id="currentLine">
      <span class="waiting">🎵 等待歌词上传 🎵</span>
    </div>
    <div class="next-line" id="nextLine"></div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="control-area">
      <button class="control-btn" id="closeBtn" title="关闭桌面歌词">
        ✕
      </button>
    </div>
  </div>

  <!-- 分离的桌面歌词脚本 -->
  <script src="desktop-lyric.js"></script>
</body>
</html>
